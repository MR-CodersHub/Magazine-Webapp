<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | The Chronicle</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        .serif {
            font-family: 'Playfair Display', serif;
        }

        .sans {
            font-family: 'Inter', sans-serif;
        }

        /* Subtle line animation for a sense of 'work in progress' */
        .loading-line {
            height: 1px;
            background: #000;
            width: 0;
            animation: grow 3s ease-in-out infinite;
        }

        @keyframes grow {
            0% {
                width: 0;
                opacity: 0;
            }

            50% {
                width: 100px;
                opacity: 1;
            }

            100% {
                width: 0;
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-[#FBFBFB] text-slate-900 sans antialiased min-h-screen flex flex-col justify-between">

    <div class="flex-grow flex items-center justify-center py-20">
        <main class="max-w-xl px-8 text-center">

            <span class="text-[10px] font-black uppercase tracking-[0.6em] text-slate-400 mb-12 block">The
                Chronicle</span>

            <h1 class="text-5xl md:text-6xl font-black serif tracking-tighter leading-none mb-8">
                Refining the <br><span class="italic font-light text-slate-500">experience.</span>
            </h1>

            <div class="flex justify-center mb-10">
                <div class="loading-line"></div>
            </div>

            <p class="text-lg md:text-xl text-slate-500 font-light leading-relaxed mb-16">
                We are currently making intentional improvements to our digital archives. Normal service will resume
                shortly.
            </p>

            <div class="pt-12 border-t border-slate-100 w-full">
                <h2 class="text-[10px] font-black uppercase tracking-[0.4em] mb-8 text-slate-400">Stay Connected</h2>

                <div class="flex flex-col md:flex-row items-center justify-center gap-10">
                    <a href="#" class="group text-[11px] font-bold uppercase tracking-widest flex items-center gap-2">
                        Instagram <span class="group-hover:translate-x-1 transition-transform">→</span>
                    </a>
                    <a href="#" class="group text-[11px] font-bold uppercase tracking-widest flex items-center gap-2">
                        Newsletter <span class="group-hover:translate-x-1 transition-transform">→</span>
                    </a>
                    <a href="#" class="group text-[11px] font-bold uppercase tracking-widest flex items-center gap-2">
                        Twitter <span class="group-hover:translate-x-1 transition-transform">→</span>
                    </a>
                </div>
            </div>
        </main>
    </div>

   

</body>

</html>
