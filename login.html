<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Chronicle</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;900&display=swap"
        rel="stylesheet">
    <style>
        .serif {
            font-family: 'Playfair Display', serif;
        }

        .sans {
            font-family: 'Inter', sans-serif;
        }

        .bg-obsidian {
            background-color: #050505;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Kinetic Input Lines */
        .input-underline {
            height: 1px;
            width: 0;
            background: #4f46e5;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        input:focus+.input-underline {
            width: 100%;
        }

        .vertical-brand {
            writing-mode: vertical-rl;
        }
    </style>
</head>

<body class="bg-obsidian text-white sans antialiased overflow-hidden">

    <div class="fixed inset-0 flex items-center justify-center z-0 pointer-events-none select-none">
        <h2 class="text-[20vw] font-black serif uppercase text-white/[0.02] tracking-tighter leading-none">
            Welcome Back
        </h2>
    </div>

    <nav
        class="fixed left-0 h-full w-24 border-r border-white/10 hidden lg:flex flex-col justify-between items-center py-12 z-50">
        <span class="vertical-brand text-[10px] font-black uppercase tracking-[1em] text-white/20">Since 2004</span>
        <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center">
            <div class="w-1 h-1 bg-indigo-500 rounded-full animate-pulse"></div>
        </div>
        <span class="vertical-brand text-[10px] font-black uppercase tracking-[1em] text-white/20">The Chronicle</span>
    </nav>

    <main class="relative z-10 h-screen w-screen flex items-center justify-center p-6">

        <div class="w-full max-w-xl grid grid-cols-1 lg:grid-cols-12 gap-0 shadow-2xl">

            <div class="hidden lg:block lg:col-span-4 bg-indigo-600 p-12 flex flex-col justify-between">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
                <div>
                    <h3 class="text-xs font-black uppercase tracking-widest leading-relaxed">System <br>Authentication
                    </h3>
                </div>
            </div>

            <div class="col-span-1 lg:col-span-8 glass-panel p-10 md:p-16">

                <form id="login-form" class="space-y-10" autocomplete="off">
                    <div class="space-y-8">
                        <div class="relative">
                            <label
                                class="text-[8px] font-black uppercase tracking-[0.4em] text-slate-500 block mb-2">Email
                                Id</label>
                            <input type="email" id="email" placeholder="name@domain.com" required
                                class="w-full bg-transparent text-xl font-light outline-none py-2 placeholder-white/5">
                            <div class="w-full h-[1px] bg-white/10 absolute bottom-0 left-0"></div>
                            <div class="input-underline absolute bottom-0 left-0"></div>
                        </div>

                        <div class="relative">
                            <div class="flex justify-between items-center mb-2">
                                <label
                                    class="text-[8px] font-black uppercase tracking-[0.4em] text-slate-500 block">Password</label>
                                <a href="#"
                                    class="text-[7px] font-bold uppercase tracking-widest text-white/30 hover:text-indigo-400 transition-colors">Forgot
                                    Password?</a>
                            </div>
                            <div class="relative">
                                <input type="password" id="password" placeholder="••••••••" required
                                    class="w-full bg-transparent text-xl font-light outline-none py-2 placeholder-white/5 pr-10">
                                <button type="button" id="toggle-password"
                                    class="absolute right-0 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="w-5 h-5" id="eye-icon">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden"
                                        id="eye-off-icon">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                                    </svg>
                                </button>
                            </div>
                            <div class="w-full h-[1px] bg-white/10 absolute bottom-0 left-0"></div>
                            <div class="input-underline absolute bottom-0 left-0"></div>
                        </div>
                    </div>

                    <div class="pt-6 space-y-6">
                        <button type="submit" id="submit-btn"
                            class="w-full bg-white text-black py-5 text-[10px] font-black uppercase tracking-[0.6em] hover:bg-indigo-600 hover:text-white transition-all duration-500">
                            Enter
                        </button>

                        <div class="flex justify-between items-center">
                            <p id="error-message" class="text-red-500 text-xs hidden"></p>
                        </div>

                        <div class="flex justify-between items-center">
                            <p class="text-[9px] text-white/20 uppercase tracking-widest">Digital Ledger Encryption v4.4
                            </p>
                            <a href="./signup.html"
                                class="text-[9px] font-black uppercase tracking-widest border-b border-white/10 pb-1 hover:border-white transition-all">Sign
                                up</a>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script type="module">
        import { mockApi } from './assets/js/mock-api.js';

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        // Toggle Password Visibility
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');

        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                if (type === 'text') {
                    eyeIcon.classList.add('hidden');
                    eyeOffIcon.classList.remove('hidden');
                } else {
                    eyeIcon.classList.remove('hidden');
                    eyeOffIcon.classList.add('hidden');
                }
            });
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            errorMsg.textContent = '';
            submitBtn.textContent = 'Authenticating...';
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1. Sign In
                const { user } = await mockApi.login(email, password);
                console.log("Logged in user:", user.uid);

                // 2. Check Role
                const userData = await mockApi.getUserProfile(user.uid);

                if (userData) {
                    console.log("User role found:", userData.role);
                    if (userData.role === 'admin') {
                        window.location.href = 'admin_dashboard.html';
                    } else {
                        window.location.href = 'user_dashboard.html';
                    }
                } else {
                    console.warn("User profile not found. Defaulting to user dashboard.");
                    window.location.href = 'user_dashboard.html';
                }

            } catch (error) {
                console.error("Login Error:", error);

                errorMsg.textContent = error.message || "Invalid Credentials";
                errorMsg.classList.remove('hidden');
                submitBtn.textContent = 'Enter';
                submitBtn.disabled = false;
            }
        });
    </script>

    </div>
    </div>
    </main>

</body>

</html>
